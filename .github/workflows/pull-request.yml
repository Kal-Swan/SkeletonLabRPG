name: Pull Request

on:
  pull_request:
    branches: ["develop"]

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: dotnet restore
        run: dotnet restore ./api/SkeletonLabRpg/SkeletonLabRpg.sln

      - name: dotnet build
        run: dotnet build ./api/SkeletonLabRpg/SkeletonLabRpg.sln --configuration Release

      - name: Build API Docker image
        run: |
          docker build -t skeletonlabrpg-api-pr -f SkeletonLabRpg.Api/Dockerfile
        working-directory: ./api/SkeletonLabRpg/
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: build-api

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "./web/main/pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefix ./web/main
      - name: Build pnpm
        run: pnpm build
        working-directory: ./web/main

      - name: Build Web Docker image
        run: |
          docker build -t skeletonlabrpg-web-pr -f dockerfile
        working-directory: ./web/main
